<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- ═══════════════════════════════════════════════ -->
  <!-- VengaiCode — Baby Tiger Icon 🐯                  -->
  <!-- Vengai (வேங்கை) = Tiger in Tamil                 -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#2563EB"/>

  <!-- Ears -->
  <circle cx="38" cy="34" r="14" fill="#FF8C00"/>
  <circle cx="90" cy="34" r="14" fill="#FF8C00"/>
  <circle cx="38" cy="36" r="7" fill="#1A1A1A"/>
  <circle cx="90" cy="36" r="7" fill="#1A1A1A"/>

  <!-- Head -->
  <ellipse cx="64" cy="68" rx="38" ry="34" fill="#FF8C00"/>

  <!-- Face mask -->
  <ellipse cx="64" cy="76" rx="26" ry="20" fill="#FFF8F0"/>

  <!-- Stripes -->
  <path d="M30 50 Q34 44 40 48" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M98 50 Q94 44 88 48" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M26 64 Q32 60 38 64" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M102 64 Q96 60 90 64" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M64 36 L64 46" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="52" cy="66" r="6" fill="#1A1A1A"/>
  <circle cx="76" cy="66" r="6" fill="#1A1A1A"/>
  <circle cx="54" cy="64" r="2" fill="#FFFFFF"/>
  <circle cx="78" cy="64" r="2" fill="#FFFFFF"/>

  <!-- Nose -->
  <ellipse cx="64" cy="80" rx="6" ry="4" fill="#1A1A1A"/>

  <!-- Mouth -->
  <path d="M64 84 Q64 90 58 90" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M64 84 Q64 90 70 90" stroke="#1A1A1A" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <path d="M44 78 L28 76" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M44 84 L28 86" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M84 78 L100 76" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <path d="M84 84 L100 86" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
</svg>
